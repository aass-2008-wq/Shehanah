*{

}
body{

.app{

.hero{

.hero h1{

}
.hero p{
font-size:20px;

}
.panel{

padding:22px;

.hidden{

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:16px;
}
.menu button,
.btn{
border:0;
border-radius:20px;
padding:18px;
cursor:pointer;
font-weight:900;
font-size:20px;
color:white;
box-shadow:0 10px 24px rgba(0,0,0,.16);
}
.mathBtn{
background:linear-gradient(135deg,#0284c7,#38bdf8);

.arabicBtn{
background:linear-gradient(135deg,#16a34a,#86efac);
}
.allBtn{
background:linear-gradient(135deg,#9333ea,#f472b6);

.darkBtn{

.top{
display:flex;

align-items:center;

.tag{

font-weight:800;
font-size:18px;
}
.question{
font-size:24px;
font-weight:900;
line-height:1.8;
}
.options{
display:grid;
gap:10px;
margin-top:18px;
}
.option{
border:2px solid #e9d5ff;
background:#faf5ff;
border-radius:17px;
padding:14px;
font-size:19px;
font-weight:800;
text-align:right;
cursor:pointer;
transition:.2s;
}
.option:hover{
transform:scale(1.01);
background:#f3e8ff;
}
.correct{
background:#dcfce7!important;
border-color:#22c55e!important;
color:#166534;
}
.wrong{
background:#fee2e2!important;
border-color:#ef4444!important;
color:#991b1b;
}
.feedback{
display:none;
margin-top:14px;
padding:13px;
border-radius:16px;
font-size:19px;
font-weight:900;
}
.good{
display:block;
background:#dcfce7;
color:#166534;
}
.bad{
display:block;
background:#fee2e2;
color:#991b1b;
}
.next{
display:none;
margin-top:14px;
background:linear-gradient(135deg,#7c3aed,#ec4899);
}
.result{
text-align:center;
}
.big{
font-size:44px;

.medal{

gap:10px;

padding:12px;

}
.rev.ok{
border-right-color:#22c55e;
}
.rev.no{
border-right-color:#ef4444;
}
.footer{
text-align:center;
color:#6b7280;
font-weight:800;
margin:22px;
}
.clock{
width:90px;
height:90px;
border:6px solid #facc15;
border-radius:50%;
margin:auto;
background:white;
position:relative;
}
.hand{
position:absolute;
width:4px;
left:43px;
top:15px;
transform-origin:bottom;
border-radius:5px;
}
.minute{
height:35px;
background:#0f172a;
}
.hour{
height:28px;
background:#ef4444;
top:22px;
}
.mEight{
transform:rotate(0deg);
}
.hEight{
transform:rotate(240deg);
}
.mTwoHalf{
transform:rotate(180deg);
}
.hTwoHalf{
transform:rotate(75deg);
}
.money span{
display:inline-block;
background:#dcfce7;
border:2px solid #16a34a;
border-radius:8px;
padding:8px 12px;
margin:4px;
}

width:100px;
height:100px;

}

.bigShape{
width:150px;
height:70px;
background:#fb7185;

.smallShape{
width:70px;
height:35px;
background:#fb7185;

</style>
</head>

},
{

answer:"اسم إشارة"
},
{
subject:"لغتي",
q:"صنف كلمة (أخوك):",
options:["اسم إشارة","الأسماء الخمسة","ظرف مكان","همزة قطع"],
answer:"الأسماء الخمسة"
},
{
subject:"لغتي",
q:"صنف كلمة (فوق):",
options:["اسم إشارة","الأسماء الخمسة","ظرف مكان","ألف مقصورة"],
answer:"ظرف مكان"
},
{

{

q:"صنف كلمة (أشكال):",

answer:"همزة قطع"

{

],
answer:"الرسول قدوتي في الصدق"

{

answer:"؟"
},
{

q:"أكمل: غابت ........ عن المدرسة.",

let selected = [];
let current = 0;
let score = 0;
let answers = [];
let mode = "الكل";
let locked = false;
const home = document.getElementById("home");
const quizPanel = document.getElementById("quizPanel");
const resultPanel = document.getElementById("resultPanel");
const tag = document.getElementById("tag");
const progress = document.getElementById("progress");
const qno = document.getElementById("qno");
const visual = document.getElementById("visual");
const question = document.getElementById("question");
const options = document.getElementById("options");
const feedback = document.getElementById("feedback");
const nextBtn = document.getElementById("nextBtn");
function startQuiz(m){
mode = m;
current = 0;
score = 0;
answers = [];
locked = false;
if(m === "الكل"){
selected = [...questions];
}else{
selected = questions.filter(x => x.subject === m);
}
home.classList.add("hidden");
resultPanel.classList.add("hidden");
quizPanel.classList.remove("hidden");
showQuestion();
}
function showQuestion(){
locked = false;
feedback.className = "feedback";
feedback.innerHTML = "";
nextBtn.style.display = "none";
let item = selected[current];
tag.textContent = item.subject;
tag.style.background = item.subject === "رياضيات" ? "#0ea5e9" : "#22c55e";
qno.textContent = `السؤال ${current + 1} من ${selected.length}`;
visual.innerHTML = item.visual || "";
question.textContent = item.q;
progress.style.width = (current / selected.length * 100) + "%";
options.innerHTML = "";
item.options.forEach(op => {
let b = document.createElement("button");
b.className = "option";
b.textContent = op;
b.onclick = () => check(b, op);
options.appendChild(b);
});
}
function check(btn, chosen){
if(locked) return;
locked = true;
let item = selected[current];
document.querySelectorAll(".option").forEach(b => {
b.disabled = true;
if(b.textContent === item.answer){
b.classList.add("correct");
}
});
let ok = chosen === item.answer;
if(ok){
score++;
feedback.className = "feedback good";
feedback.innerHTML = "إجابة صحيحة يا شيهانة ⭐";
}else{
btn.classList.add("wrong");
feedback.className = "feedback bad";
feedback.innerHTML = "إجابة غير صحيحة 🌷 الصحيح: " + item.answer;
}
answers.push({
subject:item.subject,
q:item.q,
chosen:chosen,
correct:item.answer,
ok:ok
});
nextBtn.style.display = "inline-block";
}
function nextQuestion(){
current++;
if(current >= selected.length){
finishQuiz();
}else{
showQuestion();
}
}
function finishQuiz(){
quizPanel.classList.add("hidden");
resultPanel.classList.remove("hidden");
let percent = Math.round(score / selected.length * 100);
document.getElementById("scoreBig").textContent = score + " / " + selected.length;
if(percent >= 90){
document.getElementById("medal").textContent = "🏆👑✨";
document.getElementById("resultMsg").textContent = "ممتازة يا شيهانة! النسبة: " + percent + "%";
}else if(percent >= 75){
document.getElementById("medal").textContent = "🥇⭐";
document.getElementById("resultMsg").textContent = "رائعة جدًا يا شيهانة! النسبة: " + percent + "%";
}else if(percent >= 50){
document.getElementById("medal").textContent = "🌷⭐";
document.getElementById("resultMsg").textContent = "أحسنتِ ومع المراجعة تصبحين أفضل. النسبة: " + percent + "%";
}else{
document.getElementById("medal").textContent = "💗🌱";
document.getElementById("resultMsg").textContent = "لا بأس، نعيد التدريب وننجح بإذن الله. النسبة: " + percent + "%";
}
let review = document.getElementById("review");
review.innerHTML = "<h3>مراجعة الإجابات</h3>";
answers.forEach((a, i) => {
let d = document.createElement("div");
d.className = "rev " + (a.ok ? "ok" : "no");
d.innerHTML = `<b>${i + 1}- ${a.subject}</b><br>${a.q}<br>إجابتك: ${a.chosen}<br>الصحيح: ${a.correct}`;
review.appendChild(d);
});
}
function goHome(){
home.classList.remove("hidden");
quizPanel.classList.add("hidden");
resultPanel.classList.add("hidden");
}
function restartSame(){
startQuiz(mode);
}
</script>
</body>
</html>
